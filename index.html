<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Campamento de Adolescentes 2026</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Bangers&family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>

    <style>
        :root { --brand-orange: #ff4d00; --brand-yellow: #ffba08; }
        body {
            background-color: #030303; 
            color: #ffffff; 
            font-family: 'Outfit', sans-serif;
            background-image: radial-gradient(circle at 10% 10%, rgba(255, 77, 0, 0.08) 0%, transparent 35%);
        }

        .font-bangers { font-family: 'Bangers', cursive; }

        .text-gradient {
            background: linear-gradient(135deg, var(--brand-orange), var(--brand-yellow));
            -webkit-background-clip: text; 
            -webkit-text-fill-color: transparent;
        }

        .text-gradient-origen {
            background: linear-gradient(135deg, #ffba08, #fff, #ffba08);
            background-size: 200% auto; 
            -webkit-background-clip: text; 
            -webkit-text-fill-color: transparent;
            text-shadow: 0 0 40px rgba(255, 186, 8, 0.6); 
            animation: shine 3s linear infinite;
        }

        @keyframes shine { 
            to { background-position: 200% center; } 
        }

        /* 🔥 Ajuste del glitch (más alto y más delgado) */
        .glitch-strip-container {
            width: 280px;      /* más delgado */
            height: 75px;      /* un poco más alto */
            margin: 0 auto;    /* centrado */
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 8px;
            background: #000;
            position: relative;
        }

        .glitch-strip-container video {
            width: 100%;
            height: 120%;
            object-fit: cover;
            transform: translateY(-10%);
            opacity: 0.8;
        }

        .lock-badge {
            display: flex; 
            align-items: center; 
            gap: 10px;
            background: rgba(255, 255, 255, 0.05); 
            padding: 5px 15px;
            border-radius: 10px; 
            border: 1px solid rgba(255, 255, 255, 0.1); 
            margin-top: 10px;
        }

        .fade-out { 
            opacity: 0; 
            transform: scale(0.95); 
            transition: all 0.5s ease; 
        }
    </style>
</head>

<body class="antialiased min-h-screen flex flex-col items-center">

    <div class="w-full max-w-4xl px-5 py-10 flex flex-col items-center">
        <header class="text-center w-full flex flex-col items-center">

            <h1 class="font-bangers text-6xl sm:text-8xl text-gradient uppercase leading-[0.9] mb-4">
                CAMPAMENTO<br><span class="text-white">ADOLESCENTES</span>
            </h1>

            <div class="relative w-full min-h-[180px] flex flex-col justify-center items-center">
                
                <div id="revelation-lock" class="flex flex-col items-center w-full">

                    <div class="glitch-strip-container shadow-[0_0_30px_rgba(255,77,0,0.1)]">
                        <video autoplay muted loop playsinline>
                            <source src="glitch.mp4" type="video/mp4">
                        </video>
                    </div>

                    <div class="lock-badge">
                        <span id="name-timer" class="font-bold text-xl text-white tabular-nums">--</span>
                        <svg class="w-5 h-5 text-[#ffba08]" fill="currentColor" viewBox="0 0 20 20">
                            <path d="M5 9V7a5 5 0 0110 0v2a2 2 0 012 2v5a2 2 0 01-2 2H5a2 2 0 01-2-2v-5a2 2 0 012-2zm8-2v2H7V7a3 3 0 016 0z"></path>
                        </svg>
                    </div>
                </div>

                <div id="revealed-name" class="absolute font-bangers text-7xl sm:text-[9rem] text-gradient-origen opacity-0 scale-50 transition-all duration-700">
                    ORIGEN
                </div>

            </div>
        </header>

        <section class="w-full max-w-2xl bg-white/5 backdrop-blur-md rounded-[2rem] p-8 my-10 border border-white/10">
            <div class="grid grid-cols-4 gap-4 text-center">
                <div><span id="days" class="text-4xl font-bold">00</span><p class="text-[10px] text-orange-500 uppercase">Días</p></div>
                <div><span id="hours" class="text-4xl font-bold">00</span><p class="text-[10px] text-gray-500 uppercase">Hrs</p></div>
                <div><span id="minutes" class="text-4xl font-bold">00</span><p class="text-[10px] text-gray-500 uppercase">Min</p></div>
                <div><span id="seconds" class="text-4xl font-bold text-[#ffba08]">00</span><p class="text-[10px] text-[#ffba08] uppercase">Seg</p></div>
            </div>
        </section>

        <a href="#" class="bg-orange-600 px-10 py-4 rounded-xl font-bold uppercase tracking-widest hover:bg-orange-500 transition-colors">
            Inscribirme Ahora
        </a>
    </div>

    <script>
        const unlockDate = new Date().getTime() + (60 * 1000);
        const timerText = document.getElementById("name-timer");
        const lockContainer = document.getElementById("revelation-lock");
        const nameDisplay = document.getElementById("revealed-name");

        const updateReveal = setInterval(() => {
            const distance = unlockDate - new Date().getTime();
            if (distance <= 0) {
                clearInterval(updateReveal);
                lockContainer.classList.add("fade-out");
                setTimeout(() => {
                    lockContainer.style.display = "none";
                    nameDisplay.classList.remove("opacity-0", "scale-50");
                    nameDisplay.classList.add("opacity-100", "scale-100");
                }, 500);
                return;
            }
            const s = Math.floor((distance % (1000 * 60)) / 1000);
            timerText.innerText = s + " SEG";
        }, 1000);

        const campDate = new Date("April 11, 2026 00:00:00").getTime();
        setInterval(() => {
            const d = campDate - new Date().getTime();
            document.getElementById("days").innerText = Math.floor(d / (86400000)).toString().padStart(2,'0');
            document.getElementById("hours").innerText = Math.floor((d % 86400000) / 3600000).toString().padStart(2,'0');
            document.getElementById("minutes").innerText = Math.floor((d % 3600000) / 60000).toString().padStart(2,'0');
            document.getElementById("seconds").innerText = Math.floor((d % 60000) / 1000).toString().padStart(2,'0');
        }, 1000);
    </script>

</body>
</html>
