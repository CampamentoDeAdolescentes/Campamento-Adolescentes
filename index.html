<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Campamento de Adolescentes 2026</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Fuentes -->
    <link href="https://fonts.googleapis.com/css2?family=Bangers&family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>

    <style>
        :root {
            --brand-orange: #ff4d00;
            --brand-yellow: #ffba08;
        }

        body {
            background-color: #030303;
            color: #ffffff;
            font-family: 'Outfit', sans-serif;
            background-image: 
                radial-gradient(circle at 10% 10%, rgba(255, 77, 0, 0.08) 0%, transparent 35%),
                radial-gradient(circle at 90% 90%, rgba(255, 186, 8, 0.08) 0%, transparent 35%);
        }

        .font-bangers { font-family: 'Bangers', cursive; }

        .text-gradient {
            background: linear-gradient(135deg, var(--brand-orange), var(--brand-yellow));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--brand-orange), #e64400);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 10px 30px -5px rgba(255, 77, 0, 0.5);
        }

        .btn-primary:hover {
            transform: translateY(-4px) scale(1.03);
            box-shadow: 0 25px 40px -10px rgba(255, 77, 0, 0.7);
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.3);
        }

        .video-container {
            position: relative;
            width: 100%;
            border-radius: 1.5rem;
            overflow: hidden;
            background-color: #000;
        }

        video {
            width: 100%;
            height: auto;
            display: block;
            mask-image: linear-gradient(to bottom, black 92%, transparent 100%);
            -webkit-mask-image: linear-gradient(to bottom, black 92%, transparent 100%);
        }
    </style>
</head>
<body class="antialiased min-h-screen flex flex-col items-center">

    <div class="w-full max-w-4xl px-5 py-10 flex flex-col items-center">
        
        <!-- 1. TÍTULO -->
        <header class="text-center mb-10">
            <div class="inline-flex items-center gap-2 px-4 py-1.5 rounded-full bg-white/5 border border-white/10 mb-6 backdrop-blur-md">
                <span class="w-2 h-2 rounded-full bg-[#ff4d00] animate-pulse"></span>
                <span class="text-[10px] sm:text-xs font-semibold tracking-[0.2em] uppercase text-gray-300">Abril 10, 11 & 12</span>
            </div>

            <h1 class="font-bangers text-6xl sm:text-8xl md:text-9xl text-gradient uppercase leading-[0.9] mb-4 tracking-tighter">
                CAMPAMENTO<br><span class="text-white">ADOLESCENTES</span>
            </h1>

            <p class="text-gray-400 text-sm sm:text-lg max-w-lg mx-auto font-light leading-relaxed px-4">
                Una pausa para conectar con amigos, la naturaleza y un encuentro real con Dios.
            </p>
        </header>

        <!-- 2. CRONÓMETRO -->
        <section class="w-full max-w-3xl glass-card rounded-[2rem] p-6 sm:p-10 mb-12 relative overflow-hidden">
            <div class="absolute top-0 right-0 w-32 h-32 bg-[#ff4d00]/10 blur-[60px] rounded-full"></div>
            <h3 class="text-gray-500 font-bold uppercase tracking-[0.3em] text-[10px] mb-6 text-center">Faltan solo</h3>
            
            <div class="grid grid-cols-4 gap-2 sm:gap-6" id="countdown">
                <div class="flex flex-col items-center">
                    <span id="days" class="text-3xl sm:text-6xl font-bold tracking-tighter">00</span>
                    <span class="text-[9px] sm:text-[10px] uppercase tracking-widest text-[#ff4d00] font-bold mt-1">Días</span>
                </div>
                <div class="flex flex-col items-center">
                    <span id="hours" class="text-3xl sm:text-6xl font-bold tracking-tighter">00</span>
                    <span class="text-[9px] sm:text-[10px] uppercase tracking-widest text-gray-500 font-bold mt-1">Hrs</span>
                </div>
                <div class="flex flex-col items-center">
                    <span id="minutes" class="text-3xl sm:text-6xl font-bold tracking-tighter">00</span>
                    <span class="text-[9px] sm:text-[10px] uppercase tracking-widest text-gray-500 font-bold mt-1">Min</span>
                </div>
                <div class="flex flex-col items-center">
                    <span id="seconds" class="text-3xl sm:text-6xl font-bold tracking-tighter text-[#ffba08]">00</span>
                    <span class="text-[9px] sm:text-[10px] uppercase tracking-widest text-[#ffba08] font-bold mt-1">Seg</span>
                </div>
            </div>
        </section>

        <!-- 3. VIDEO -->
        <section class="w-full mb-12 group px-2 sm:px-0">
            <div class="video-container shadow-2xl border border-white/5">
                <video autoplay muted loop playsinline class="hover:scale-[1.01] transition-transform duration-700">
                    <source src="campa.mp4" type="video/mp4">
                    Tu navegador no soporta el video.
                </video>
            </div>
        </section>

        <!-- 4. BOTÓN DE INSCRIPCIÓN -->
        <section class="w-full flex flex-col items-center px-4">
            <a href="https://docs.google.com/forms/d/e/1FAIpQLSdjjlpnCs4_l5AYTFvlwr-VJJgupQnsudj7my3d2HmB_M4eBQ/viewform?usp=publish-editor" 
               target="_blank"
               class="btn-primary w-full sm:w-auto px-12 py-5 rounded-2xl text-white font-extrabold text-xl uppercase tracking-widest flex items-center justify-center gap-3">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"></path></svg>
                Inscribirme Ahora
            </a>
            
            <p class="text-[10px] text-gray-600 uppercase tracking-[0.4em] mt-12 font-medium">
                CUPO LIMITADO • ABRIL 2026
            </p>
        </section>

    </div>

    <script>
        const campDate = new Date("April 11, 2026 00:00:00").getTime();

        const updateCountdown = setInterval(function() {
            const now = new Date().getTime();
            const distance = campDate - now;

            const days = Math.floor(distance / (1000 * 60 * 60 * 24));
            const hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
            const seconds = Math.floor((distance % (1000 * 60)) / 1000);

            document.getElementById("days").innerText = days.toString().padStart(2, '0');
            document.getElementById("hours").innerText = hours.toString().padStart(2, '0');
            document.getElementById("minutes").innerText = minutes.toString().padStart(2, '0');
            document.getElementById("seconds").innerText = seconds.toString().padStart(2, '0');

            if (distance < 0) {
                clearInterval(updateCountdown);
                document.getElementById("countdown").innerHTML = "<div class='col-span-full text-2xl font-bold tracking-widest text-[#ffba08]'>¡EL DÍA HA LLEGADO!</div>";
            }
        }, 1000);
    </script>
</body>
</html>
